<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Submissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@600&display=swap" rel="stylesheet">
<script>
/* CONFIG — same Apps Script /exec URL as the rest. round filters the list. */
const CONFIG = {
  round: "Round 5",
  endpoint: "",        // <-- Apps Script /exec URL
  pollSeconds: 6
};
</script>
<style>
  :root{ --navy:#1f3a5f; --soft:#555; --rule:#d8dde5; --bg:#f4f6f9; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:#1a1a1a;background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased;}
  header{background:var(--navy);color:#fff;padding:1.3rem 1.25rem;display:flex;justify-content:space-between;align-items:baseline;}
  header .kick{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.65);}
  header h1{font-family:'Crimson Pro',serif;font-size:1.6rem;font-weight:600;margin-top:.15rem;}
  header .count{font-size:.85rem;color:rgba(255,255,255,.75);text-align:right;}
  header .count b{font-family:'Crimson Pro',serif;font-size:1.7rem;color:#fff;display:block;}
  .wrap{max-width:820px;margin:0 auto;padding:1.1rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.9rem;}
  .doc{background:#fff;border:1px solid var(--rule);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(20,30,50,.05);}
  .doc .prev{height:150px;background:#eef2f7;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--rule);overflow:hidden;}
  .doc .prev iframe{width:100%;height:100%;border:0;}
  .doc .prev .ico{font-size:2.2rem;color:#9aa7b8;}
  .doc .meta{padding:.6rem .75rem;}
  .doc .pseudo{font-weight:700;color:var(--navy);font-size:.95rem;}
  .doc .fn{font-size:.76rem;color:var(--soft);margin-top:.15rem;word-break:break-all;}
  .doc .ts{font-size:.7rem;color:#9aa7b8;margin-top:.3rem;}
  .doc a.open{display:block;text-align:center;padding:.5rem;border-top:1px solid var(--rule);color:var(--navy);font-weight:600;font-size:.85rem;text-decoration:none;}
  .doc a.open:hover{background:#f3f6fa;}
  .empty{text-align:center;color:var(--soft);padding:3rem 1rem;}
  .demo-tag{background:#fff3cd;color:#7a5b00;font-size:.72rem;text-align:center;padding:.3rem;font-weight:600;}
  .back{display:inline-block;margin:1rem 0 0;color:var(--navy);font-weight:600;font-size:.9rem;text-decoration:none;}
</style>
</head>
<body>
<div id="demoTag" class="demo-tag" style="display:none;">DEMO MODE — set an ENDPOINT to load real submissions.</div>
<header>
  <div><div class="kick">Lesson 10 · SBAR Pilot · <span id="roundLbl"></span></div><h1>All Submissions</h1></div>
  <div class="count"><b id="n">0</b>submitted</div>
</header>
<div class="wrap">
  <div class="grid" id="grid"></div>
  <a class="back" href="upload.html">← Back to submit</a>
</div>

<script>
const $=id=>document.getElementById(id);
$('roundLbl').textContent=CONFIG.round;

// --- Gate: students can't browse until they've submitted their own MFR.
//     Instructor bypass: add ?instructor=1 (or ?all=1) to the URL. ---
const params=new URLSearchParams(location.search);
const isInstructor = params.has('instructor') || params.has('all');
const hasSubmitted = (()=>{ try{ return localStorage.getItem('mb_submitted_'+CONFIG.round)==='1'; }catch(e){ return false; } })();
if(!isInstructor && !hasSubmitted){
  document.querySelector('.wrap').innerHTML =
    '<div class="empty" style="padding:4rem 1rem;">'
    + '<div style="font-family:\'Crimson Pro\',serif;font-size:1.5rem;color:var(--navy);margin-bottom:.6rem;">Submit your MFR first.</div>'
    + '<p>You can browse everyone’s submissions once your own draft is in.</p>'
    + '<a class="back" href="upload.html" style="margin-top:1.2rem;">← Go submit your MFR</a></div>';
  throw new Error('gated'); // stop the rest of the script from loading the list
}
function icon(mime){ return (mime||'').includes('pdf') ? 'PDF' : 'DOC'; }
function card(f){
  const isPdf=(f.mime||'').includes('pdf');
  const prev = isPdf && f.url
    ? `<iframe src="${f.url}#toolbar=0&navpanes=0" loading="lazy"></iframe>`
    : `<div class="ico">${icon(f.mime)}</div>`;
  const when = f.ts ? new Date(f.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="doc"><div class="prev">${prev}</div>
    <div class="meta"><div class="pseudo">${esc(f.pseudonym||'—')}</div>
      <div class="fn">${esc(f.filename||'')}</div><div class="ts">${when}</div></div>
    ${f.url?`<a class="open" href="${f.url}" target="_blank" rel="noopener">Open full document</a>`:''}</div>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function draw(files){
  $('n').textContent=files.length;
  $('grid').innerHTML = files.length ? files.map(card).join('')
    : '<div class="empty">No submissions yet. They\'ll appear here as students upload.</div>';
}
async function load(){
  if(CONFIG.endpoint){
    try{ const r=await fetch(CONFIG.endpoint+'?action=list&round='+encodeURIComponent(CONFIG.round)+'&t='+Date.now());
      const d=await r.json(); draw((d.files||[]).sort((a,b)=>(b.ts||'').localeCompare(a.ts||''))); }
    catch(e){}
  }else{
    $('demoTag').style.display='block';
    draw(JSON.parse(localStorage.getItem('mb_uploads')||'[]'));
  }
}
load(); setInterval(load, CONFIG.pollSeconds*1000);
</script>
</body>
</html>
