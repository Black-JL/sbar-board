<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Board — Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@600&display=swap" rel="stylesheet">
<script>
/* ============================================================
   CONFIG — edit these two things before each class.
   1) ENDPOINT: paste your Apps Script web-app /exec URL (see SETUP.md).
      Leave "" to run in DEMO mode (tally stays on this device only).
   2) FINALISTS: the finalists you're showing, in order, with pseudonyms.
   ============================================================ */
const CONFIG = {
  round: "Round 5",
  endpoint: "https://script.google.com/macros/s/AKfycbwE5SNYvF-vqk7aVJcrx-9e9qanRWken4iUlI889VTOdhYK-0wWO053KOe01RjhhEbKgw/exec",   // <-- paste Apps Script /exec URL here
  finalists: [
    { id: 1, pseudonym: "—" },
    { id: 2, pseudonym: "—" },
    { id: 3, pseudonym: "—" },
    { id: 4, pseudonym: "—" },
    { id: 5, pseudonym: "—" }
  ]
};
const DIMENSIONS = [
  { key: "human",     name: "Sounds human, not AI",   desc: "No AI tells. Reads like a real person wrote it." },
  { key: "source",    name: "Source-anchored",        desc: "Every claim traces to the source packet. No fabrication." },
  { key: "restrained",name: "Restrained",             desc: "No superlatives. Lets the facts carry the weight." },
  { key: "format",    name: "AR 25-50 format + BLUF", desc: "Header, numbered paras, BLUF in para 2, POC, signature block." },
  { key: "compelling",name: "Compelling",             desc: "After one read you remember the recommendation and why." },
  { key: "nopii",     name: "No PII leaked",          desc: "No patient names, MRNs, DOBs, or DOD IDs in the text." }
];
</script>
<style>
  :root{ --navy:#1f3a5f; --navy-dark:#16293f; --ink:#1a1a1a; --soft:#555; --rule:#d8dde5; --bg:#f4f6f9; --good:#1c7c4a; --bad:#a23a2c; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:var(--ink);background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:6rem;}
  header{background:var(--navy);color:#fff;padding:1.4rem 1.25rem;}
  header .kick{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.65);}
  header h1{font-family:'Crimson Pro',serif;font-size:1.7rem;font-weight:600;line-height:1.05;margin-top:.2rem;}
  header .instr{font-size:.85rem;color:rgba(255,255,255,.8);margin-top:.5rem;max-width:40rem;}
  .wrap{max-width:680px;margin:0 auto;padding:1.1rem;}
  .finalist{background:#fff;border:1px solid var(--rule);border-radius:10px;margin:1rem 0;overflow:hidden;box-shadow:0 1px 3px rgba(20,30,50,.05);}
  .finalist > .fhead{background:#eef2f7;border-bottom:1px solid var(--rule);padding:.7rem .9rem;display:flex;justify-content:space-between;align-items:baseline;}
  .finalist .fnum{font-family:'Crimson Pro',serif;font-size:1.25rem;font-weight:600;color:var(--navy);}
  .finalist .fpseudo{font-size:.82rem;color:var(--soft);}
  .finalist .fpseudo b{color:var(--ink);}
  .fbody{padding:.4rem .9rem .9rem;}
  .forward{display:flex;align-items:center;gap:.6rem;padding:.7rem 0;border-bottom:1px dashed var(--rule);margin-bottom:.3rem;}
  .forward .q{font-weight:600;font-size:.92rem;flex:1;}
  .toggle{display:inline-flex;border:1px solid var(--rule);border-radius:100px;overflow:hidden;}
  .toggle button{border:none;background:#fff;padding:.4rem .9rem;font-family:'Inter';font-size:.82rem;font-weight:600;color:var(--soft);cursor:pointer;}
  .toggle button.yes.on{background:var(--good);color:#fff;}
  .toggle button.no.on{background:var(--bad);color:#fff;}
  .dim{padding:.55rem 0;border-bottom:1px solid #f0f2f5;}
  .dim:last-child{border-bottom:none;}
  .dim .dname{font-weight:600;font-size:.9rem;color:var(--navy);}
  .dim .ddesc{font-size:.76rem;color:var(--soft);margin:.1rem 0 .4rem;}
  .scale{display:flex;gap:.4rem;}
  .scale button{flex:1;border:1px solid var(--rule);background:#fff;border-radius:7px;padding:.5rem 0;font-family:'Inter';font-size:.95rem;font-weight:600;color:var(--soft);cursor:pointer;transition:.12s;}
  .scale button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ftotal{text-align:right;font-size:.82rem;color:var(--soft);margin-top:.5rem;}
  .ftotal b{font-family:'Crimson Pro',serif;font-size:1.1rem;color:var(--navy);}
  .submitbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--rule);padding:.75rem 1rem;display:flex;justify-content:center;box-shadow:0 -2px 10px rgba(20,30,50,.06);}
  .submitbar button{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:.8rem 2.2rem;font-family:'Inter';font-size:1rem;font-weight:700;cursor:pointer;width:100%;max-width:660px;}
  .submitbar button:disabled{background:#9aa7b8;cursor:not-allowed;}
  .done{text-align:center;padding:4rem 1.5rem;}
  .done h2{font-family:'Crimson Pro',serif;color:var(--navy);font-size:1.9rem;}
  .done p{color:var(--soft);margin-top:.6rem;}
  .demo-tag{background:#fff3cd;color:#7a5b00;font-size:.72rem;text-align:center;padding:.3rem;font-weight:600;}
  .docview{border-bottom:1px solid var(--rule);background:#f0f2f5;}
  .docview iframe{width:100%;height:440px;border:0;display:block;}
  .docopen{display:block;text-align:center;padding:.55rem;font-size:.84rem;font-weight:600;color:var(--navy);text-decoration:none;border-top:1px solid #e3e8ef;background:#fff;}
  .docopen:hover{background:#f3f6fa;}
  .closed{text-align:center;padding:4rem 1rem;color:var(--soft);}
  .closed .big{font-family:'Crimson Pro',serif;font-size:1.5rem;color:var(--navy);margin-bottom:.5rem;}
</style>
</head>
<body>
<div id="demoTag" class="demo-tag" style="display:none;">DEMO MODE — votes stay on this device. Paste an ENDPOINT in vote.html to go live.</div>
<header>
  <div class="kick">Lesson 10 · Mock Board · <span id="roundLbl"></span></div>
  <h1>Score the finalists.</h1>
  <div class="instr">For each finalist: would you forward this MFR to the Commander? Then rate 1–5 on each dimension (5 = excellent). Submit once when you're done with all of them.</div>
</header>
<div class="wrap" id="cards"></div>
<div class="submitbar"><button id="submitBtn" disabled>Submit my scores</button></div>

<script>
const state = {}; // finalistId -> { forward: 'yes'|'no'|null, scores:{key:1-5} }
const voter = (function(){ let v=localStorage.getItem('mb_voter'); if(!v){ v='v'+Math.abs(Math.random().toString().slice(2)).toString().slice(0,9); localStorage.setItem('mb_voter',v);} return v; })();

function totalFor(f){ const s=state[f.id].scores; return DIMENSIONS.reduce((a,d)=>a+(s[d.key]||0),0); }
function render(){
  document.getElementById('roundLbl').textContent = CONFIG.round;
  if(!CONFIG.endpoint) document.getElementById('demoTag').style.display='block';
  const c=document.getElementById('cards'); c.innerHTML='';
  CONFIG.finalists.forEach(f=>{
    state[f.id]={forward:null,scores:{}};
    const el=document.createElement('div'); el.className='finalist';
    el.innerHTML=`<div class="fhead"><span class="fnum">Finalist #${f.id}</span><span class="fpseudo">pseudonym: <b>${f.pseudonym}</b></span></div>
      ${f.url?`<div class="docview"><iframe src="${f.url}#toolbar=1&navpanes=0" title="Finalist ${f.id} document" loading="lazy"></iframe></div><a class="docopen" href="${f.url}" target="_blank" rel="noopener">Open full document ↗</a>`:''}
      <div class="fbody">
        <div class="forward"><span class="q">Forward to the Commander?</span>
          <span class="toggle"><button class="yes" data-f="${f.id}" data-v="yes">Yes</button><button class="no" data-f="${f.id}" data-v="no">No</button></span>
        </div>
        ${DIMENSIONS.map(d=>`<div class="dim"><div class="dname">${d.name}</div><div class="ddesc">${d.desc}</div>
          <div class="scale">${[1,2,3,4,5].map(n=>`<button data-f="${f.id}" data-d="${d.key}" data-n="${n}">${n}</button>`).join('')}</div></div>`).join('')}
        <div class="ftotal">Total: <b id="tot-${f.id}">0</b> / 30</div>
      </div>`;
    c.appendChild(el);
  });
  c.addEventListener('click',onClick);
}
function onClick(e){
  const b=e.target.closest('button'); if(!b) return;
  if(b.dataset.v){ const f=b.dataset.f; state[f].forward=b.dataset.v;
    b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }
  if(b.dataset.n){ const f=b.dataset.f, d=b.dataset.d; state[f].scores[d]=+b.dataset.n;
    b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    document.getElementById('tot-'+f).textContent=totalFor(CONFIG.finalists.find(x=>x.id==f)); }
  checkComplete();
}
function checkComplete(){
  const ok=CONFIG.finalists.every(f=>state[f.id].forward && DIMENSIONS.every(d=>state[f.id].scores[d.key]));
  document.getElementById('submitBtn').disabled=!ok;
}
function submit(){
  const payload={action:'vote',voter,round:CONFIG.round,ts:new Date().toISOString(),
    votes:CONFIG.finalists.map(f=>({finalist:f.id,pseudonym:f.pseudonym,forward:state[f.id].forward,
      scores:state[f.id].scores,total:totalFor(f)}))};
  if(CONFIG.endpoint){
    fetch(CONFIG.endpoint,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)}).catch(()=>{});
  } else {
    const all=JSON.parse(localStorage.getItem('mb_votes')||'[]'); all.push(payload); localStorage.setItem('mb_votes',JSON.stringify(all));
  }
  document.body.innerHTML='<div class="done"><h2>Scores submitted.</h2><p>Thanks — your ballot is in. Watch the screen for the tally.</p></div>';
}
document.getElementById('submitBtn').addEventListener('click',submit);

// Load the finalists the instructor published (with their documents).
// Falls back to CONFIG.finalists only in pure demo (no endpoint, none published).
async function init(){
  let list=null;
  if(CONFIG.endpoint){
    try{ const r=await fetch(CONFIG.endpoint+'?action=finalists&round='+encodeURIComponent(CONFIG.round)+'&t='+Date.now());
      const d=await r.json(); list=d.finalists||[]; }catch(e){ list=[]; }
  } else {
    const ls=localStorage.getItem('mb_finalists_'+CONFIG.round);
    if(ls){ try{ list=JSON.parse(ls); }catch(e){} }
  }
  if(Array.isArray(list)){
    if(list.length===0){ return showClosed(); }   // endpoint up, nothing published yet
    CONFIG.finalists = list.map(f=>({ id:f.finalist, pseudonym:f.pseudonym, url:f.url }));
  }
  render();
}
function showClosed(){
  document.querySelector('.wrap').innerHTML =
    '<div class="closed"><div class="big">Voting isn’t open yet.</div>'
    + '<p>The instructor is picking the finalists. This page will open on its own the moment voting starts — just leave it up.</p></div>';
  document.querySelector('.submitbar').style.display='none';
  pollUntilOpen();
}
// While closed, quietly check for published finalists and reload once voting opens —
// students don't have to refresh. Only runs in the closed state, so in-progress
// ballots are never wiped. No-op in demo mode (no endpoint).
function pollUntilOpen(){
  if(!CONFIG.endpoint) return;
  setTimeout(async ()=>{
    try{
      const r=await fetch(CONFIG.endpoint+'?action=finalists&round='+encodeURIComponent(CONFIG.round)+'&t='+Date.now());
      const d=await r.json();
      if(Array.isArray(d.finalists) && d.finalists.length){ location.reload(); return; }
    }catch(e){}
    pollUntilOpen();
  }, 4000);
}
init();
</script>
</body>
</html>
